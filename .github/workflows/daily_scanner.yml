name: Daily SA Scanner

on:
  schedule:
    - cron: '0 6 * * 1-5'
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
    inputs:
      no_claude:
        description: 'Skip Claude analysis (data only)'
        type: boolean
        default: false
      tickers:
        description: 'Specific tickers (e.g. "VST PLTR")'
        type: string
        default: ''

permissions:
  contents: write
  actions: read

concurrency:
  group: scanner-state
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write

    env:
      PYTHONPATH: ${{ github.workspace }}
      TZ: UTC
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate secrets
        run: |
          python -c "
          import os
          required = ['ANTHROPIC_API_KEY', 'TRADIER_API_KEY', 'FINNHUB_API_KEY']
          missing  = [k for k in required if not os.environ.get(k)]
          if missing:
              print(f'ERROR: Missing required secrets: {missing}')
              exit(1)
          print('Secret validation OK')
          "
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRADIER_API_KEY:   ${{ secrets.TRADIER_API_KEY }}
          FINNHUB_API_KEY:   ${{ secrets.FINNHUB_API_KEY }}

      - name: Create directories
        run: |
          mkdir -p data/signals data/cards data/historical data/cache
          mkdir -p dashboard/cards

      - name: Build CLI args
        id: cli
        run: |
          ARGS=""
          if [ "${{ inputs.no_claude }}" = "true" ]; then
            ARGS="$ARGS --no-claude"
          fi
          if [ -n "${{ inputs.tickers }}" ]; then
            ARGS="$ARGS --ticker ${{ inputs.tickers }}"
          fi
          echo "args=$ARGS" >> $GITHUB_OUTPUT

      - name: Run full pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRADIER_API_KEY:   ${{ secrets.TRADIER_API_KEY }}
          FINNHUB_API_KEY:   ${{ secrets.FINNHUB_API_KEY }}
          EIA_API_KEY:       ${{ secrets.EIA_API_KEY }}
          FRED_API_KEY:      ${{ secrets.FRED_API_KEY }}
        run: python main.py ${{ steps.cli.outputs.args }}

      - name: Load stats
        id: stats
        run: |
          if [ -f /tmp/scanner_stats.env ]; then
            cat /tmp/scanner_stats.env >> $GITHUB_ENV
          else
            echo "SIGNAL_COUNT=0"   >> $GITHUB_ENV
            echo "REGIME_MODE=UNKNOWN" >> $GITHUB_ENV
            echo "CANDIDATE_COUNT=0"  >> $GITHUB_ENV
          fi

      - name: Send email notification (only if cards generated)
        if: env.SIGNAL_COUNT != '0'
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          TRADIER_API_KEY:    ${{ secrets.TRADIER_API_KEY }}
          FINNHUB_API_KEY:    ${{ secrets.FINNHUB_API_KEY }}
          EIA_API_KEY:        ${{ secrets.EIA_API_KEY }}
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
        run: |
          python -c "
          import sys, json, sqlite3, logging
          from pathlib import Path
          sys.path.insert(0, '.')
          logging.basicConfig(level=logging.INFO)
          from scanner.output.email_notifier import load_todays_cards, send_email
          from scanner.utils.state_manager import StateManager
          cards = load_todays_cards()
          if cards:
              with StateManager() as sm:
                  import json as j
                  regime_path = Path('data/signals/regime.json')
                  regime = j.loads(regime_path.read_text()) if regime_path.exists() else {}
              result = send_email(cards, regime)
              print(f'Email sent: {result} | {len(cards)} cards')
          else:
              print('No PASS cards found in DB')
          "

      - name: Commit state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            Scanner ${{ github.run_number }} | Cards: ${{ env.SIGNAL_COUNT }} | Regime: ${{ env.REGIME_MODE }} | Candidates: ${{ env.CANDIDATE_COUNT }}
          file_pattern: 'data/ dashboard/'
          commit_user_name: SA Scanner Bot
          commit_user_email: scanner@github-actions.local
          skip_dirty_check: false

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scanner-debug-${{ github.run_number }}
          path: |
            data/scanner.db
            data/signals/
          retention-days: 7
